name: Feature Request
description: Suggest a new capability or improvement for EderaON.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        All fields below are optional — fill in what you have.

  - type: textarea
    id: problem
    attributes:
      label: Problem being solved
      description: What limitation or gap is this addressing?
    required: false

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like to see this addressed?
    required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you explored and why you ruled them out.
    required: false

  - type: input
    id: context
    attributes:
      label: Use case context
      description: e.g. security team, platform engineering, CI/CD pipeline
      placeholder: security team
    required: false
